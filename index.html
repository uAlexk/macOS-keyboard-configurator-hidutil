<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⌨️</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Simple tool to generate hidutil key remapping configurations for MacOS"
    />
    <title>hidutil key remapping generator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <a href="https://github.com/uAlexk/macOS-keyboard-configurator-hidutil/" class="app__github-link" aria-label="GitHub repository">
        <svg width="32" height="32" viewBox="0 0 16 16" aria-hidden="true">
          <path fill="#000" fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
        </svg>
      </a>

      <header class="header">
        <span class="header__icon" role="img" aria-label="keyboard">⌨️</span>
        <h1 class="header__title">hidutil key remapping generator for MacOS</h1>
      </header>

      <section class="keyboard-panel" aria-label="Keyboard remapping editor">
        <div class="keyboard-panel__intro">
          <p class="keyboard-panel__copy">Click a key on the keyboard, then press the key you want it to become.</p>
          <p id="keyboard-status" class="keyboard-panel__status">Select a key to start remapping.</p>
        </div>

        <div id="keyboard" class="keyboard" aria-label="MacBook keyboard layout"></div>

        <div class="keyboard-panel__actions">
          <button id="clear-selected" type="button">Clear selected mapping</button>
          <button id="clear-all" type="button">Clear all mappings</button>
        </div>
      </section>

      <section class="result">
        <div class="result__header">
          <h5 class="result__header__title">Copy the command below and run it in <code>Terminal</code></h5>
          <button id="copy-config" type="button">Copy</button>
        </div>

        <pre id="result-content" class="result__content"></pre>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
